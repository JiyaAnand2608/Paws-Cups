<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find the Treat - Paws & Cups</title>

  <link rel="stylesheet" href="playzone.css">
</head>

<body>

  <div class="game-container">

    <h2>🐶 Find the Treat!</h2>

    <p class="subtitle">
      Can you help Bruno find his hidden treat?
    </p>

    <img
      src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
      id="bruno"
      class="bruno"
    >

    <div class="cups-row" id="cups-container"></div>

    <div class="game-message" id="game-message">
      Pick a cup to start!
    </div>

    <button id="restart-btn">
      🔄 Play Again
    </button>

    <br>

    <a href="about2.html" class="back-link">
      ← Back to Paws & Cups
    </a>

  </div>

  <!-- WIN SOUND -->
  <audio id="winSound">
    <source src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" type="audio/mpeg">
  </audio>

  <!-- LOSE SOUND -->
  <audio id="loseSound">
    <source src="https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>

</body>
</html>
